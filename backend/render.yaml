services:
  - type: web
    name: addis-kidan-api
    runtime: python
    buildCommand: "pip install -r requirements/production.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: addis-kidan-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: addis-kidan-redis
          type: keyvalue
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

  - type: worker
    name: addis-kidan-worker
    runtime: python
    buildCommand: "pip install -r requirements/production.txt"
    startCommand: "celery -A config.celery worker --loglevel=info --concurrency=2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - fromGroup: addis-kidan-secrets

  - type: cron
    name: addis-kidan-cron-reminders
    runtime: python
    buildCommand: "pip install -r requirements/production.txt"
    startCommand: "python manage.py send_reminders"
    schedule: "0 9 * * *"  # 9am UTC daily
    envVars:
      - fromGroup: addis-kidan-secrets

databases:
  - name: addis-kidan-db
    databaseName: addis_kidan
    user: addis_kidan_user
    plan: starter  # Upgrade to a plan with PITR before launch

keyValueStores:
  - name: addis-kidan-redis
    plan: starter
